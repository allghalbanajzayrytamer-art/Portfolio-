<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Admin Secure - Amine OV</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Cairo',sans-serif;
    background:#0b0f19;
    color:white;
    margin:0;
}

header{
    text-align:center;
    padding:20px;
    font-size:22px;
    color:#8b5cf6;
    font-weight:bold;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:#111827;
    padding:15px;
    margin-bottom:10px;
    border-radius:12px;
}

.name{color:#8b5cf6;font-weight:bold;}
.phone{color:#94a3b8;font-size:14px;}
.msg{margin-top:10px;}

button{
    margin-top:10px;
    padding:8px 12px;
    border:none;
    border-radius:8px;
    background:#ef4444;
    color:white;
    cursor:pointer;
}
button:hover{background:#dc2626;}

/* login screen */
#loginBox{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:#0b0f19;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

input{
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
    width:250px;
    margin-top:10px;
}

.loginBtn{
    background:#8b5cf6;
    margin-top:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <h2>🔐 دخول لوحة التحكم</h2>
    <input type="password" id="pass" placeholder="أدخل كلمة السر">
    <button class="loginBtn" onclick="checkPass()">دخول</button>
</div>

<!-- ADMIN CONTENT -->
<div id="adminContent" style="display:none;">

<header>لوحة التحكم 🚀</header>

<div class="container" id="orders"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyADFTTpM05oN5ypOqaNCSkdLiCZbtiA3l4",
  authDomain: "amine-ov.firebaseapp.com",
  projectId: "amine-ov",
  storageBucket: "amine-ov.firebasestorage.app",
  messagingSenderId: "27000450697",
  appId: "1:27000450697:web:ceba8d6c320e85aebda058"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* 🔐 password check */
function checkPass(){
    let p = document.getElementById("pass").value;

    if(p === "A7m!n-OV@2026"){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("adminContent").style.display="block";
        loadOrders();
    }else{
        alert("❌ كلمة السر خاطئة");
    }
}

/* load orders */
function loadOrders(){
    const container = document.getElementById("orders");
    container.innerHTML="";

    db.collection("orders").orderBy("date","desc")
    .onSnapshot(snapshot=>{
        container.innerHTML="";

        snapshot.forEach(doc=>{
            let d = doc.data();

            container.innerHTML += `
                <div class="card">
                    <div class="name">${d.name}</div>
                    <div class="phone">${d.phone}</div>
                    <div class="msg">${d.message}</div>
                    <button onclick="deleteOrder('${doc.id}')">حذف</button>
                </div>
            `;
        });
    });
}

function deleteOrder(id){
    db.collection("orders").doc(id).delete();
}
</script>

</body>
</html>
